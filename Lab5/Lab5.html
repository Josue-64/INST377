<!DOCTYPE html>
<html lang="en">
<head>
    <title>Currency Converter</title>
    <link rel="stylesheet" href="Lab5.css" />
    <script defer src="Lab5.js"></script>
</head>
<body>

  <h1>Let's Convert some Currency!</h1>

  <form id="converter_form" onsubmit="submitForm(); return false;">
    <label for="from_currency">From Currency:</label>
    <select id="from_currency" name="from">
        <option value="" disabled selected>Choose a currency</option>
    </select>
    <br><br>

    <label for="to_currency">To Currency:</label>
    <select id="to_currency" name="to">
        <option value="" disabled selected>Choose a currency</option>
    </select>
    <br><br>

    <label for="amount">Number to Convert:</label>
    <input type="number" step="0.01" id="amount"required/>
    <br><br>

    <button type="submit">Submit</button>
  </form>

  <h1 id="converted_amount"> </h1>

</body>
</html>
